name: Flutter Android CI

on:
  push:
    branches:
      - dev

  pull_request:
    branches:
      - dev

jobs:

  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Cache Pub Dependencies
      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Verify Formatting
      - name: Verify Formatting
        run: dart format --output=none --set-exit-if-changed lib test

      # Static Analysis
      - name: Analyze Project
        run: flutter analyze

      # Run Tests
      - name: Run Tests
        run: flutter test

  build_apk:
    needs: analyze_and_test
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Build APK
      - name: Build APK
        run: flutter build apk --debug --flavor development -t lib/main_development.dart

      # Upload APK Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-development-debug.apk
